<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>DCSC Pre-ECNL Boys 2015 — Season Stats</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="parents.css">
</head>
<body>

  <header id="app-header">
    <h1 id="team-name">Loading...</h1>
    <p id="season-label"></p>
  </header>

  <main>
    <!-- Games Tab -->
    <section id="tab-games" class="tab-panel active">
      <div id="season-summary"></div>
      <div id="games-list"></div>
      <div id="last-updated"></div>
    </section>

    <!-- Stats Tab -->
    <section id="tab-stats" class="tab-panel">
      <div class="stats-toggle">
        <button class="stats-toggle-btn active" data-view="team">Team</button>
        <button class="stats-toggle-btn" data-view="players">Players</button>
      </div>
      <div id="stats-team" class="stats-view active">
        <div id="team-record"></div>
        <div id="opponent-history"></div>
      </div>
      <div id="stats-players" class="stats-view">
        <div id="player-leaderboard"></div>
      </div>
    </section>
  </main>

  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="games">Games</button>
    <button class="tab-btn" data-tab="stats">Stats</button>
  </nav>

  <script src="parents.js"></script>
</body>
</html>
